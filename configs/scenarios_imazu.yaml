# Imazu benchmark problem scenarios (GAP #8 — 2026-06-10; GAP #10 — 2026-06-10)
#
# 22 classic COLREGs encounter scenarios from:
#   Imazu, H., Koyama, T. (1987). "The optimization of the criterion for
#   ship's manoeuvring to avoid collision." J. Japan Inst. Navigation, 77.
#
# These are the standard benchmark for ship collision avoidance algorithms.
# All coordinates in local frame [m], headings in [rad], speeds in [m/s].
#
# Coverage (22/22 complete):
#   1-ship encounters (pairwise):  Imazu_01–09, 13–15  (12 scenarios)
#   2-ship combined encounters:    Imazu_10–12, 16–19  (7 scenarios)
#   3-ship encounters:             Imazu_20, 21         (2 scenarios)
#   4-ship encounters:             Imazu_22             (1 scenario)
#
# Use with: python scripts/run_all_core.py --scenarios-file configs/scenarios_imazu.yaml

scenarios:
  # ── Head-on encounters (Imazu #1–4) ──────────────────────────────────────
  Imazu_01:
    name: "Imazu #1 — Head-on, same speed, zero CPA"
    description: "Classic head-on encounter at equal speed, zero CPA. Both must alter to starboard (Rule 14)."
    waterway: "open_sea"
    duration: 600.0
    dt: 0.5
    ownship_initial: {x: 0.0, y: 0.0, psi: 0.0, u: 6.0, v: 0.0, r: 0.0}
    targets:
      - mmsi: "IM001"
        vessel_type: "cargo"
        initial: {x: 2000.0, y: 0.0, psi: 3.14159, u: 6.0, v: 0.0, r: 0.0}
        length: 180.0
        beam: 30.0
        draught: 10.5
        nav_status: "underway"
    environment: {water_depth: 50.0, current_x: 0.0, current_y: 0.0, wind_x: 0.0, wind_y: 0.0, channel_width: 5000.0}

  Imazu_02:
    name: "Imazu #2 — Head-on, target faster"
    description: "Target vessel is faster (8 vs 5 m/s). Closing speed higher; TCPA shorter."
    waterway: "open_sea"
    duration: 600.0
    dt: 0.5
    ownship_initial: {x: 0.0, y: 0.0, psi: 0.0, u: 5.0, v: 0.0, r: 0.0}
    targets:
      - mmsi: "IM002"
        vessel_type: "cargo"
        initial: {x: 2000.0, y: 0.0, psi: 3.14159, u: 8.0, v: 0.0, r: 0.0}
        length: 180.0
        beam: 30.0
        draught: 10.5
        nav_status: "underway"
    environment: {water_depth: 50.0, channel_width: 5000.0}

  Imazu_03:
    name: "Imazu #3 — Head-on, lateral offset starboard"
    description: "Target offset to starboard; may pass safely if both maintain course."
    waterway: "open_sea"
    duration: 600.0
    dt: 0.5
    ownship_initial: {x: 0.0, y: 0.0, psi: 0.0, u: 6.0, v: 0.0, r: 0.0}
