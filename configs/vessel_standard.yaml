# Standard vessel configurations for quantitative MMG model validation
# Coefficients sourced from Yasukawa & Yoshimura (2015) and SIMMAN 2020 Workshop
#
# These configurations use the standard MMG nondimensionalization:
#   - Surge: 0.5 * rho * L * d * U^2
#   - Sway/Yaw: 0.5 * rho * L^2 * d * U^2
#
# For everyday use in the collision avoidance framework (where all methods
# share the same dynamics), the simplified vessel model in vessel.yaml is
# sufficient. Use these standard configs for quantitative validation against
# published experimental data (see tests/validation/test_mmg_validation.py).

KVLCC2_loaded:
  description: "KVLCC2 tanker, loaded condition — SIMMAN 2020 benchmark"
  type: tanker
  length: 320.0
  beam: 58.0
  draught: 16.5
  mass: 3.12e8
  Iz: 3.0e12
  D_prop: 9.86
  max_rudder: 35.0
  max_rudder_rate: 5.0
  max_yaw_rate: 3.0
  min_turning_radius: 960.0  # 3 * L
  design_speed: 7.97  # m/s (~15.5 kn)
  mmg_version: standard
  mmg:
    X_uu: -0.040
    Y_v: -0.315
    Y_r: 0.083
    Y_vv: -0.548
    Y_rr: 0.020
    Y_vr: -0.395
    N_v: -0.137
    N_r: -0.049
    N_vv: 0.029
    N_rr: -0.024
    N_vr: -0.179
    Y_delta: 0.046
    N_delta: -0.023
    K_T_coeff: 0.18

